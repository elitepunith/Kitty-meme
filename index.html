<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>kitty-meme 🐾</title>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Inconsolata:wght@400;600&family=Kalam:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:  #fdf6e3;
      --ink:    #1a1208;
      --cat:    #e36b2f;
      --cat2:   #f4a836;
      --pale:   #ffeecb;
      --grey:   #c8b89a;
      --paper:  #f5edda;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: 'Inconsolata', monospace;
      min-height: 100vh;
      background-image: repeating-linear-gradient(
        0deg, transparent, transparent 28px,
        rgba(0,0,0,.03) 29px
      );
    }

    /* ── HEADER ── */
    header {
      background: var(--ink);
      color: var(--cream);
      padding: 18px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      border-bottom: 4px solid var(--cat);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-family: 'Bangers', cursive;
      font-size: 2.2rem;
      letter-spacing: 3px;
      color: var(--cat2);
      line-height: 1;
      display: inline-block;
      transform: rotate(-1deg);
      cursor: pointer;
      user-select: none;
      transition: opacity .15s;
    }
    .logo:hover { opacity: .82; }
    .logo span { color: var(--cream); }

    .tagline {
      font-size: .78rem;
      color: var(--grey);
      margin-top: 3px;
      font-style: italic;
    }

    .tabs {
      display: flex;
      gap: 6px;
    }

    .tab-btn {
      background: transparent;
      border: 2px solid var(--grey);
      color: var(--grey);
      font-family: 'Bangers', cursive;
      font-size: 1.05rem;
      letter-spacing: 1.5px;
      padding: 6px 16px;
      border-radius: 4px;
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
    }
    .tab-btn:hover, .tab-btn.active {
      background: var(--cat);
      border-color: var(--cat);
      color: var(--ink);
    }

    /* ── GALLERY ── */
    #gallery-tab { display: block; }
    #maker-tab   { display: none; }

    .gallery {
      padding: 20px;
      columns: 4 220px;
      column-gap: 16px;
    }

    .card {
      break-inside: avoid;
      margin-bottom: 16px;
      position: relative;
      cursor: pointer;
      border: 3px solid var(--ink);
      border-radius: 6px;
      overflow: hidden;
      background: #ddd;
      transition: transform .2s, box-shadow .2s;
    }
    .card:hover {
      transform: scale(1.03) rotate(0deg) !important;
      box-shadow: 6px 6px 0 var(--ink);
      z-index: 2;
    }
    .card img {
      width: 100%;
      display: block;
      object-fit: cover;
    }

    .card-actions {
      position: absolute;
      bottom: 0;
      left: 0; right: 0;
      padding: 8px;
      background: linear-gradient(transparent, rgba(0,0,0,.78));
      display: flex;
      gap: 5px;
      opacity: 0;
      transition: opacity .2s;
    }
    .card:hover .card-actions { opacity: 1; }

    /* Always show on touch */
    @media (hover: none) {
      .card-actions { opacity: 1; }
    }

    .card-btn {
      flex: 1;
      padding: 6px 0;
      border: none;
      border-radius: 3px;
      font-family: 'Kalam', cursive;
      font-size: .76rem;
      cursor: pointer;
      font-weight: 700;
      transition: filter .15s;
    }
    .card-btn:hover { filter: brightness(1.15); }
    .btn-dl   { background: var(--cat2); color: var(--ink); }
    .btn-edit { background: var(--cat);  color: var(--ink); }

    .no-results {
      padding: 60px 28px;
      text-align: center;
      font-family: 'Kalam', cursive;
      font-size: 1.3rem;
      color: var(--grey);
      display: none;
    }

    /* ── LIGHTBOX ── */
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 300;
      background: rgba(0,0,0,.9);
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      padding: 20px;
    }
    .lightbox.open { display: flex; }

    .lightbox img {
      max-width: min(800px, 92vw);
      max-height: 70vh;
      border: 4px solid var(--cream);
      border-radius: 4px;
      object-fit: contain;
    }

    .lb-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .lb-btn {
      padding: 10px 22px;
      border: none;
      border-radius: 4px;
      font-family: 'Bangers', cursive;
      font-size: 1.15rem;
      letter-spacing: 1.5px;
      cursor: pointer;
      transition: filter .15s, transform .1s;
    }
    .lb-btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
    .lb-dl   { background: var(--cat2); color: var(--ink); }
    .lb-edit { background: var(--cat);  color: var(--ink); }
    .lb-close {
      background: transparent;
      border: 2px solid var(--grey);
      color: var(--grey);
      padding: 8px 18px;
      border-radius: 4px;
      font-family: 'Bangers', cursive;
      font-size: 1.05rem;
      cursor: pointer;
    }
    .lb-close:hover { border-color: var(--cream); color: var(--cream); }

    /* ── MAKER ── */
    .maker-wrap {
      padding: 24px 20px;
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      align-items: flex-start;
    }

    .maker-panel {
      background: var(--paper);
      border: 3px solid var(--ink);
      border-radius: 6px;
      padding: 18px;
      width: 100%;
      max-width: 320px;
    }

    .maker-panel h3 {
      font-family: 'Bangers', cursive;
      font-size: 1.45rem;
      letter-spacing: 2px;
      margin-bottom: 14px;
      color: var(--cat);
    }

    .form-row { margin-bottom: 13px; }
    .form-row label {
      display: block;
      font-size: .82rem;
      font-family: 'Kalam', cursive;
      margin-bottom: 4px;
      font-weight: 700;
    }
    .form-row input[type=text],
    .form-row input[type=range],
    .form-row input[type=color],
    .form-row select {
      width: 100%;
      padding: 7px 10px;
      border: 2px solid var(--ink);
      border-radius: 3px;
      font-family: 'Inconsolata', monospace;
      font-size: .9rem;
      background: var(--cream);
      color: var(--ink);
    }
    .form-row input[type=range] { padding: 0; cursor: pointer; }
    .form-row input[type=color] { padding: 2px; height: 38px; cursor: pointer; }

    .thumb-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      max-height: 150px;
      overflow-y: auto;
      border: 2px solid var(--grey);
      border-radius: 4px;
      padding: 6px;
      background: var(--cream);
    }
    .thumb-strip img {
      width: 52px; height: 52px;
      object-fit: cover;
      border: 2px solid transparent;
      border-radius: 3px;
      cursor: pointer;
      transition: border-color .15s;
    }
    .thumb-strip img.selected { border-color: var(--cat); }

    .maker-canvas-wrap {
      flex: 1;
      min-width: 260px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    #memeCanvas {
      border: 3px solid var(--ink);
      border-radius: 6px;
      background: #888;
      width: 100%;
      max-width: 560px;
      display: block;
    }

    .maker-btns {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .maker-dl-btn {
      padding: 10px 26px;
      background: var(--cat2);
      border: 3px solid var(--ink);
      border-radius: 4px;
      font-family: 'Bangers', cursive;
      font-size: 1.25rem;
      letter-spacing: 1.5px;
      cursor: pointer;
      transition: box-shadow .15s, transform .1s;
    }
    .maker-dl-btn:hover {
      box-shadow: 4px 4px 0 var(--ink);
      transform: translate(-2px, -2px);
    }

    .maker-reset-btn {
      padding: 10px 18px;
      background: transparent;
      border: 3px solid var(--ink);
      border-radius: 4px;
      font-family: 'Kalam', cursive;
      font-size: .9rem;
      cursor: pointer;
    }
    .maker-reset-btn:hover { background: var(--pale); }

    /* ── FOOTER ── */
    footer {
      margin-top: 40px;
      border-top: 3px dashed var(--grey);
      padding: 16px 20px;
      text-align: center;
      font-size: .78rem;
      color: var(--grey);
      font-style: italic;
    }

    /* ── MOBILE RESPONSIVE ── */
    @media (max-width: 700px) {
      header {
        padding: 12px 14px;
        gap: 8px;
      }
      .logo { font-size: 1.75rem; letter-spacing: 2px; }
      .tagline { font-size: .68rem; }
      .tab-btn { font-size: .88rem; padding: 5px 11px; }

      .gallery {
        columns: 2 140px;
        column-gap: 10px;
        padding: 12px 10px;
      }
      .card { margin-bottom: 10px; }
      .card-actions { opacity: 1; }
      .card-btn { font-size: .7rem; padding: 5px 0; }

      .maker-wrap {
        padding: 14px 12px;
        flex-direction: column;
      }
      .maker-panel { max-width: 100%; }
      .maker-canvas-wrap { min-width: 100%; }

      .lb-btn { font-size: 1rem; padding: 8px 14px; }
      .lb-close { font-size: .95rem; padding: 7px 14px; }
    }

    @media (max-width: 400px) {
      .gallery { columns: 2 100px; column-gap: 8px; padding: 8px; }
      .logo { font-size: 1.4rem; }
      .tabs { gap: 4px; }
      .tab-btn { font-size: .78rem; padding: 5px 8px; }
      header { padding: 10px 10px; }
    }
  </style>
</head>

<!-- HEADER -->
<header>
  <div>
    <div class="logo" onclick="switchTab('gallery')" role="button" tabindex="0"
         onkeydown="if(event.key==='Enter'||event.key===' ') switchTab('gallery')">
      kitty<span>-</span>meme 🐾
    </div>
    <div class="tagline">because the internet runs on cats and caffeine</div>
  </div>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('gallery')">📸 Gallery</button>
    <button class="tab-btn" onclick="switchTab('maker')">✏️ Meme Maker</button>
  </div>
</header>

<!-- GALLERY TAB -->
<div id="gallery-tab">
  <div class="gallery" id="gallery"></div>
  <div class="no-results" id="noResults">no cats found 😿</div>
</div>

<!-- MAKER TAB -->
<div id="maker-tab">
  <div class="maker-wrap">
    <div class="maker-panel">
      <h3>🖊 Meme Settings</h3>

      <div class="form-row">
        <label>pick a cat</label>
        <div class="thumb-strip" id="thumbStrip"></div>
      </div>

      <div class="form-row">
        <label>top text</label>
        <input type="text" id="topText" placeholder="ur title here" oninput="renderMeme()" />
      </div>

      <div class="form-row">
        <label>bottom text</label>
        <input type="text" id="botText" placeholder="punchline goes brrr" oninput="renderMeme()" />
      </div>

      <div class="form-row">
        <label>font size — <span id="fontSizeLabel">40</span>px</label>
        <input type="range" id="fontSize" min="18" max="80" value="40"
               oninput="document.getElementById('fontSizeLabel').textContent=this.value; renderMeme()" />
      </div>

      <div class="form-row">
        <label>text color</label>
        <input type="color" id="textColor" value="#ffffff" oninput="renderMeme()" />
      </div>

      <div class="form-row">
        <label>stroke color</label>
        <input type="color" id="strokeColor" value="#000000" oninput="renderMeme()" />
      </div>

      <div class="form-row">
        <label>font style</label>
        <select id="fontStyle" onchange="renderMeme()">
          <option value="Impact">Impact (classic)</option>
          <option value="Arial Black">Arial Black</option>
          <option value="Georgia">Georgia (fancy)</option>
          <option value="Courier New">Courier New (retro)</option>
          <option value="Comic Sans MS">Comic Sans (unhinged)</option>
        </select>
      </div>
    </div>

    <div class="maker-canvas-wrap">
      <canvas id="memeCanvas" width="560" height="560"></canvas>
      <div class="maker-btns">
        <button class="maker-dl-btn" onclick="downloadMeme()">⬇ Download Meme</button>
        <button class="maker-reset-btn" onclick="clearTexts()">clear text</button>
      </div>
      <p style="font-size:.78rem; color:var(--grey); font-style:italic;">
        click any thumbnail on the left to load it onto the canvas, then type your text. hit download when it slaps. 🐱
      </p>
    </div>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <img id="lbImg" src="" alt="kitty" />
  <div class="lb-actions">
    <button class="lb-btn lb-dl"   onclick="downloadImg(currentSrc, currentAlt)">⬇ Download</button>
    <button class="lb-btn lb-edit" onclick="openInMaker()">✏️ Make a Meme</button>
    <button class="lb-close"       onclick="closeLightboxBtn()">✕ Close</button>
  </div>
</div>

<footer>
  made with ☕ &amp; questionable sleep — no kittens were harmed 🐱
</footer>

    { src: "assets/8873ef2d65c75e59237e928811a5f640.jpg", alt: "Kitty meme", moods: ["angry"] },
    { src: "assets/a3b5bafe5706341c53bbac302c356c81.jpg", alt: "Kitty meme", moods: ["vibes"] },
    { src: "assets/be0147c5c2af23c45059c69e654d5f9a.jpg", alt: "Kitty meme", moods: ["silly"] },
    { src: "assets/a60a8cb9e152df9f3a6b5221016d818d.jpg", alt: "Kitty meme", moods: ["chaos"] },
    { src: "assets/cc6b87e7e01a27991151938950edb3ee.jpg", alt: "Kitty meme", moods: ["vibes"] },
    { src: "assets/664faf82551937247df2c9a680a36e6c.jpg", alt: "Kitty meme", moods: ["angry"] },
    { src: "assets/0b85f4f5beae67805e9161b80768e8f6.jpg", alt: "Kitty meme", moods: ["silly"] },
    { src: "assets/c3017da5716bdca8502a44371205d4e9.jpg", alt: "Kitty meme", moods: ["chaos"] },

    { src: "assets/6513703d6bdfc2183f265c767d210c26.jpg", alt: "Kitty meme", moods: ["chaos"] },
  ];

  let currentSrc = '';
  let currentAlt = '';
  let makerImg   = null;

  function buildGallery() {
    const gallery    = document.getElementById('gallery');
    const thumbStrip = document.getElementById('thumbStrip');
    gallery.innerHTML    = '';
    thumbStrip.innerHTML = '';

    const tilts = [-2, -1, 0, 1, 2];
    images.forEach((img, i) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.style.transform = `rotate(${tilts[i % tilts.length]}deg)`;

      card.innerHTML = `
        <img src="${img.src}" alt="${img.alt}" loading="lazy" />
        <div class="card-actions">
          <button class="card-btn btn-dl"   onclick="event.stopPropagation(); downloadImg('${img.src}','${img.alt}')">⬇ save</button>
          <button class="card-btn btn-edit" onclick="event.stopPropagation(); openInMakerSrc('${img.src}')">✏️ meme it</button>
        </div>
      `;
      card.addEventListener('click', () => openLightbox(img.src, img.alt));
      gallery.appendChild(card);

      const th = document.createElement('img');
      th.src = img.src;
      th.alt = img.alt;
      th.title = img.alt;
      th.dataset.src = img.src;
      if (i === 0) { th.classList.add('selected'); loadMakerImg(img.src); }
      th.addEventListener('click', () => {
        document.querySelectorAll('.thumb-strip img').forEach(t => t.classList.remove('selected'));
        th.classList.add('selected');
        loadMakerImg(img.src);
      });
      thumbStrip.appendChild(th);
    });
  }

  /* ── LIGHTBOX ── */
  function openLightbox(src, alt) {
    currentSrc = src; currentAlt = alt;
    document.getElementById('lbImg').src = src;
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeLightbox(e) {
    if (e.target === document.getElementById('lightbox')) closeLightboxBtn();
  }
  function closeLightboxBtn() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  }
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightboxBtn(); });

  function openInMaker() {
    closeLightboxBtn();
    openInMakerSrc(currentSrc);
  }
  function openInMakerSrc(src) {
    switchTab('maker');
    document.querySelectorAll('.thumb-strip img').forEach(t =>
      t.classList.toggle('selected', t.dataset.src === src)
    );
    loadMakerImg(src);
  }

  /* ── DOWNLOAD ── */
  function downloadImg(src, alt) {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      const c = document.createElement('canvas');
      c.width = img.naturalWidth; c.height = img.naturalHeight;
      c.getContext('2d').drawImage(img, 0, 0);
      const a = document.createElement('a');
      a.href = c.toDataURL('image/jpeg', 0.92);
      a.download = (alt || 'kitty-meme').replace(/\s+/g, '-').toLowerCase() + '.jpg';
      a.click();
    };
    img.onerror = () => window.open(src, '_blank');
    img.src = src + '?t=' + Date.now();
  }

  /* ── MAKER ── */
  function loadMakerImg(src) {
    const canvas = document.getElementById('memeCanvas');
    const img = new Image();
    img.onload = () => {
      makerImg = img;
      const side = Math.min(img.naturalWidth, img.naturalHeight, 560);
      canvas.width = side; canvas.height = side;
      renderMeme();
    };
    img.src = src;
  }

  function renderMeme() {
    const canvas = document.getElementById('memeCanvas');
    const ctx = canvas.getContext('2d');
    if (!makerImg) return;
    const w = canvas.width, h = canvas.height;
    const iw = makerImg.naturalWidth, ih = makerImg.naturalHeight;
    const scale = Math.max(w / iw, h / ih);
    ctx.clearRect(0, 0, w, h);
    ctx.drawImage(makerImg, (w - iw*scale)/2, (h - ih*scale)/2, iw*scale, ih*scale);

    const size   = parseInt(document.getElementById('fontSize').value);
    const fill   = document.getElementById('textColor').value;
    const stroke = document.getElementById('strokeColor').value;
    const font   = document.getElementById('fontStyle').value;
    ctx.font        = `900 ${size}px '${font}', Impact, sans-serif`;
    ctx.fillStyle   = fill;
    ctx.strokeStyle = stroke;
    ctx.lineWidth   = size / 9;
    ctx.textAlign   = 'center';
    ctx.lineJoin    = 'round';

    const top = document.getElementById('topText').value.toUpperCase();
    const bot = document.getElementById('botText').value.toUpperCase();
    if (top) { ctx.strokeText(top, w/2, size+10); ctx.fillText(top, w/2, size+10); }
    if (bot) { ctx.strokeText(bot, w/2, h-14);    ctx.fillText(bot, w/2, h-14); }
  }

  function clearTexts() {
    document.getElementById('topText').value = '';
    document.getElementById('botText').value = '';
    renderMeme();
  }

  function downloadMeme() {
    const a = document.createElement('a');
    a.href = document.getElementById('memeCanvas').toDataURL('image/jpeg', 0.93);
    a.download = 'my-kitty-meme.jpg';
    a.click();
  }

  /* ── TABS ── */
  function switchTab(tab) {
    document.getElementById('gallery-tab').style.display = tab === 'gallery' ? 'block' : 'none';
    document.getElementById('maker-tab').style.display   = tab === 'maker'   ? 'block' : 'none';
    document.querySelectorAll('.tab-btn').forEach((btn, i) => {
      btn.classList.toggle('active', (i === 0 && tab === 'gallery') || (i === 1 && tab === 'maker'));
    });
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  buildGallery();
</script>
